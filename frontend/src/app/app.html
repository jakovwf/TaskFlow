@if (showNavbar()) {
  <div class="tf-app-shell">
    <app-navbar />

    <main class="min-w-0 p-4 pb-28 pt-20 md:pb-32">
      <router-outlet />
    </main>
  </div>
} @else {
  <main class="tf-app-shell">
    <router-outlet />
  </main>
}

@if (confirmModal.state(); as modal) {
  <app-confirm-modal
    [title]="modal.title"
    [message]="modal.message"
    [confirmText]="modal.confirmText"
    [cancelText]="modal.cancelText"
    [danger]="modal.danger"
    (confirmed)="confirmModal.resolve(true)"
    (cancelled)="confirmModal.resolve(false)"
  />
}

<app-toast></app-toast>
