<aside
  class="fixed inset-y-0 left-0 z-40 border-r border-base-300 bg-base-100 shadow-xl transition-all duration-300 lg:static lg:block lg:shadow-none"
  [class.w-72]="isSidebarOpen"
  [class.w-0]="!isSidebarOpen"
  [class.-translate-x-full]="!isSidebarOpen"
  [class.lg:-translate-x-0]="!isSidebarOpen"
  [class.overflow-hidden]="!isSidebarOpen"
>
  <nav class="min-h-full w-72 p-4">
    <div class="mb-6 flex items-center justify-between gap-3">
      <a routerLink="/home" class="block text-xl font-bold tracking-tight text-primary">Trello Klon</a>
      <button
        type="button"
        class="btn btn-ghost btn-square btn-sm"
        aria-label="Zatvori sidebar"
        (click)="toggleSidebar()"
      >
        <span class="text-2xl leading-none">&lsaquo;</span>
      </button>
    </div>

    <div class="mb-6">
      <p class="mb-2 text-xs font-semibold uppercase text-base-content/60">Workspaceovi</p>
      <ul class="menu rounded-box border border-base-300 bg-base-200/70">
        <li><a routerLink="/home">Svi workspaceovi</a></li>
        <li><a routerLink="/w/demo-workspace">Demo workspace</a></li>
      </ul>
    </div>

    <div>
      <p class="mb-2 text-xs font-semibold uppercase text-base-content/60">Boardovi</p>
      <ul class="menu rounded-box border border-base-300 bg-base-200/70">
        <li><a routerLink="/b/demo-board">Demo board</a></li>
        <li><a routerLink="/b/demo-board/members">Clanovi boarda</a></li>
        <li><a routerLink="/b/demo-board/activity">Aktivnost boarda</a></li>
      </ul>
    </div>
  </nav>
</aside>

@if (!isSidebarOpen) {
  <button
    type="button"
    class="btn btn-primary btn-square fixed left-3 top-3 z-50 shadow-lg"
    aria-label="Otvori sidebar"
    (click)="toggleSidebar()"
  >
    <span class="text-xl leading-none">&#9776;</span>
  </button>
}

<header
  class="navbar fixed right-0 top-0 z-30 min-h-16 border-b border-base-300 bg-base-100/95 px-3 shadow-sm backdrop-blur transition-all duration-300"
  [class.left-72]="isSidebarOpen"
  [class.left-0]="!isSidebarOpen"
>
  <div class="navbar-start">
    @if (isSidebarOpen) {
      <button
        type="button"
        class="btn btn-ghost btn-square lg:hidden"
        aria-label="Zatvori sidebar"
        (click)="toggleSidebar()"
      >
        <span class="text-2xl leading-none">&lsaquo;</span>
      </button>
    }
  </div>

  <div class="navbar-center lg:hidden">
    <a routerLink="/home" class="text-lg font-semibold">Trello Klon</a>
  </div>

  <div class="navbar-end">
    <a routerLink="/notifications" class="btn btn-ghost btn-square" aria-label="Notifikacije">
      <div class="indicator">
        <span class="indicator-item badge badge-primary badge-sm">{{ unreadCount$ | async }}</span>
        <span class="text-xl leading-none">&#128276;</span>
      </div>
    </a>
    <button type="button" class="btn btn-outline btn-sm ml-2" (click)="logout()">Logout</button>
  </div>
</header>
