services:
  postgres:
    image: postgres:16-alpine
    container_name: rwa_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - rwa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rwa_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "${BACKEND_PORT}:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: docker
    container_name: rwa_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  rwa_postgres_data:
