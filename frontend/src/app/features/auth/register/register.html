<main
  class="flex min-h-screen items-center justify-center px-4 py-10"
>
  <section class="card tf-panel w-full max-w-md text-base-content">
    <div class="card-body gap-5 p-6 sm:p-8">
      <header class="text-center">
        <img src="logo/taskflow-icon.png" alt="TaskFlow" class="mx-auto h-14 w-14 object-contain" />
        <p class="tf-kicker mt-4">TaskFlow</p>
        <h1 class="mt-2 text-3xl font-bold">Registracija</h1>
        <p class="mt-2 text-sm text-base-content/60">Kreiraj nalog i odmah nastavi u aplikaciju.</p>
      </header>

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium">Ime za prikaz</span>
          </div>
          <input
            type="text"
            formControlName="displayName"
            autocomplete="name"
            class="input input-bordered w-full bg-base-100"
            placeholder="Tvoje ime"
          />
        </label>

        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium">Email</span>
          </div>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            class="input input-bordered w-full bg-base-100"
            placeholder="ime@example.com"
          />
        </label>

        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium">Lozinka</span>
          </div>
          <input
            type="password"
            formControlName="password"
            autocomplete="new-password"
            class="input input-bordered w-full bg-base-100"
            placeholder="Najmanje 6 karaktera"
          />
        </label>

        @if (error$ | async; as error) {
          <div class="alert alert-error items-start text-sm shadow-sm">{{ error }}</div>
        }

        <button type="submit" class="btn btn-primary w-full shadow-md" [disabled]="form.invalid || (loading$ | async)">
          @if (loading$ | async) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Registruj se
        </button>
      </form>

      <p class="text-center text-sm text-base-content/60">
        Vec imas nalog?
        <a routerLink="/login" class="link link-primary font-medium">Prijavi se</a>
      </p>
    </div>
  </section>
</main>
