<div class="tf-toast-container fixed bottom-20 left-4 right-4 z-[9999] flex flex-col gap-2 sm:bottom-auto sm:left-auto sm:right-4 sm:top-4 sm:w-80" aria-live="polite">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="alert min-h-[48px] transition-all duration-300"
      [class.alert-success]="toast.type === 'success'"
      [class.alert-error]="toast.type === 'error'"
      [class.alert-warning]="toast.type === 'warning'"
      [class.alert-info]="toast.type === 'info'"
      [class.translate-y-2]="!toast.visible"
      [class.opacity-0]="!toast.visible"
    >
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full border border-current font-bold" aria-hidden="true">
        {{ icon(toast.type) }}
      </span>
      <span class="min-w-0 flex-1 text-sm">{{ toast.message }}</span>
      <button type="button" class="btn btn-ghost btn-xs btn-circle" aria-label="Zatvori" (click)="toastService.dismiss(toast.id)">&times;</button>
    </div>
  }
</div>
