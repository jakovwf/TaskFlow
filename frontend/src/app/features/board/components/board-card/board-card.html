<div
  class="board-card-tile tf-card block w-full cursor-pointer overflow-hidden p-3 text-left"
  [class.is-done]="card.isDone"
  [style.borderTopColor]="card.coverColor || null"
  [style.borderTopWidth]="card.coverColor ? '2px' : null"
  role="button"
  tabindex="0"
  (click)="selectCard()"
  (keydown)="handleKeydown($event)"
>
  @if (card.labels?.length) {
    <div class="mb-2.5 flex flex-wrap gap-1" aria-label="Labele kartice">
      @for (cardLabel of card.labels; track cardLabel.id) {
        <span
          class="h-2 w-10 rounded-full"
          [style.backgroundColor]="cardLabel.label.color"
          [attr.title]="cardLabel.label.name"
        ></span>
      }
    </div>
  }
  <div class="flex items-start gap-2.5">
    <input
      type="checkbox"
      class="card-done-checkbox checkbox checkbox-primary mt-0.5 shrink-0"
      aria-label="Oznaci karticu kao zavrsenu"
      [checked]="card.isDone"
      (click)="$event.stopPropagation()"
      (change)="toggleDone($event)"
    />
    <div class="min-w-0 flex-1">
      <div class="flex flex-wrap items-center gap-1.5">
        <h3 class="card-title min-w-0 font-medium">{{ card.title }}</h3>
        @if (card.isDone) {
          <span class="done-badge badge border-0">Gotovo</span>
        }
      </div>
  @if (card.description) {
    <p class="mt-1.5 line-clamp-3 text-sm leading-relaxed text-base-content/65">{{ card.description }}</p>
  }
    </div>
  </div>
</div>
