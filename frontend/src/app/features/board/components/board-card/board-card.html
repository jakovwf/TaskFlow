<button
  type="button"
  class="block w-full rounded-xl border border-base-300 bg-base-100 p-3 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-primary/30 hover:shadow-md"
  (click)="selectCard()"
>
  <h3 class="font-medium">{{ card.title }}</h3>
  @if (card.description) {
    <p class="mt-1 text-sm text-base-content/70">{{ card.description }}</p>
  }
</button>
