<div
  class="board-list-panel tf-panel flex h-full w-full flex-col p-3"
  [style.borderTopColor]="list.accentColor || null"
  [style.borderTopWidth]="list.accentColor ? '4px' : null"
>
  <div class="board-list-header mb-3 shrink-0 grid gap-2 sm:grid-cols-[1fr_auto]">
    <div class="min-w-0">
      <input
        type="text"
        class="input input-bordered input-sm w-full font-semibold transition focus:border-primary"
        aria-label="Naziv liste"
        [(ngModel)]="editableListTitle"
        [disabled]="renaming"
        (blur)="commitListTitle()"
        (keydown)="handleListTitleKeydown($event)"
      />
      <div class="mt-1 min-h-4 text-xs">
        @if (renaming) {
          <span class="text-base-content/50">Cuvanje...</span>
        } @else if (renameError) {
          <span class="text-error">{{ renameError }}</span>
        }
      </div>
    </div>
    <div class="flex items-center justify-end gap-1 sm:flex-col sm:items-end">
      <details #colorPicker class="dropdown dropdown-end">
        <summary class="btn btn-ghost btn-sm" aria-label="Boja liste">Boja</summary>
        <div class="list-color-picker dropdown-content z-30 mt-2 grid w-44 grid-cols-4 gap-2 rounded-box border border-base-300 p-3 shadow-xl">
          @for (color of accentColors; track color.label) {
            <button
              type="button"
              class="color-swatch"
              [class.is-selected]="list.accentColor === color.value"
              [style.background]="color.preview"
              [attr.aria-label]="color.label"
              [attr.title]="color.label"
              (click)="setAccentColor(color.value)"
            ></button>
          }
        </div>
      </details>
      <button type="button" class="btn btn-error btn-outline btn-sm" [disabled]="loading" (click)="emitDelete()">
        Obrisi
      </button>
    </div>
  </div>

  <div
    class="card-drop-zone mb-4 min-h-24 flex-1 space-y-3 overflow-y-auto overscroll-contain rounded-lg p-2"
    cdkDropList
    [id]="list.id"
    [cdkDropListData]="list.cards ?? emptyCards"
    [cdkDropListConnectedTo]="connectedDropLists"
    (cdkDropListDropped)="emitCardDrop($event)"
  >
    @if (list.cards?.length) {
      @for (card of list.cards; track card.id) {
        <app-board-card
          cdkDrag
          [card]="card"
          (selected)="cardSelected.emit($event)"
          (doneChange)="cardDoneChange.emit($event)"
        />
      }
    } @else {
      <div class="list-empty-state">
        <p class="font-medium">Nema kartica u ovoj listi.</p>
        <p class="mt-1 text-xs text-base-content/55">Dodaj novu karticu ili prevuci postojecu ovde.</p>
      </div>
    }
  </div>

  <div class="add-card-panel grid shrink-0 gap-2 border-t border-base-300 pt-3">
    <input
      type="text"
      class="input input-bordered input-sm"
      placeholder="Nova kartica"
      [(ngModel)]="cardTitle"
    />
    <input
      type="text"
      class="input input-bordered input-sm"
      placeholder="Opis, opciono"
      [(ngModel)]="cardDescription"
    />
    <button type="button" class="btn btn-primary btn-sm" [disabled]="loading" (click)="emitCreateCard()">
      @if (loading) {
        <span class="loading loading-spinner loading-xs"></span>
      }
      Dodaj karticu
    </button>
  </div>
</div>
