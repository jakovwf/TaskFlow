<div class="modal modal-open modal-bottom sm:modal-middle" role="dialog" aria-modal="true" [attr.aria-label]="title">
  <div class="modal-box w-full max-w-sm">
    <h3 class="text-lg font-bold">{{ title }}</h3>
    <p class="py-4 text-base-content/75">{{ message }}</p>
    <div class="flex flex-col justify-end gap-2 sm:flex-row">
      <button type="button" class="btn btn-ghost w-full sm:w-auto" (click)="cancelled.emit()">
        {{ cancelText }}
      </button>
      <button
        type="button"
        class="btn w-full sm:w-auto"
        [class.btn-error]="danger"
        [class.btn-primary]="!danger"
        (click)="confirmed.emit()"
      >
        {{ confirmText }}
      </button>
    </div>
  </div>
  <button type="button" class="modal-backdrop" aria-label="Zatvori" (click)="cancelled.emit()"></button>
</div>
