<div class="tf-toast-container" aria-live="polite">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="tf-toast transition-all duration-300"
      [class.alert-success]="toast.type === 'success'"
      [class.alert-error]="toast.type === 'error'"
      [class.alert-warning]="toast.type === 'warning'"
      [class.alert-info]="toast.type === 'info'"
      [class.translate-y-2]="!toast.visible"
      [class.opacity-0]="!toast.visible"
    >
      <span class="tf-toast-icon" aria-hidden="true">
        @if (toast.type === 'success') {
          <svg viewBox="0 0 20 20" fill="none">
            <path d="m5 10 3 3 7-7" />
          </svg>
        } @else if (toast.type === 'info') {
          <span>i</span>
        } @else {
          <span>!</span>
        }
      </span>
      <span class="min-w-0 flex-1 text-sm leading-5">{{ toast.message }}</span>
      <button type="button" class="tf-toast-close" aria-label="Zatvori" (click)="toastService.dismiss(toast.id)">&times;</button>
    </div>
  }
</div>
