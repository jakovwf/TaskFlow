<main
  class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 px-4 py-10"
>
  <section class="card w-full max-w-md border border-slate-200/80 bg-white/95 text-slate-900 shadow-2xl">
    <div class="card-body gap-5 p-6 sm:p-8">
      <header class="text-center">
        <p class="text-sm font-semibold uppercase tracking-wide text-primary">Trello Klon</p>
        <h1 class="mt-2 text-3xl font-bold">Prijava</h1>
        <p class="mt-2 text-sm text-slate-500">Nastavi ka svojim workspaceovima i boardovima.</p>
      </header>

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium text-slate-700">Email</span>
          </div>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            class="input input-bordered w-full bg-white"
            placeholder="ime@example.com"
          />
        </label>

        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium text-slate-700">Lozinka</span>
          </div>
          <input
            type="password"
            formControlName="password"
            autocomplete="current-password"
            class="input input-bordered w-full bg-white"
            placeholder="Unesi lozinku"
          />
        </label>

        @if (error$ | async; as error) {
          <div class="alert alert-error items-start text-sm shadow-sm">{{ error }}</div>
        }

        <button type="submit" class="btn btn-primary w-full shadow-md" [disabled]="form.invalid || (loading$ | async)">
          @if (loading$ | async) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Prijavi se
        </button>
      </form>

      <p class="text-center text-sm text-slate-500">
        Nemas nalog?
        <a routerLink="/register" class="link link-primary font-medium">Registruj se</a>
      </p>
    </div>
  </section>
</main>
