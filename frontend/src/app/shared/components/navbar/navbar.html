@if (isSidebarOpen) {
<aside
  class="fixed inset-0 z-50 min-h-screen border-r border-base-300 bg-base-100 shadow-xl transition-all duration-300 lg:static lg:z-40 lg:block lg:w-72 lg:shadow-none"
>
  <nav class="flex min-h-full w-full flex-col p-4 lg:w-72">
    <div class="mb-6 flex items-center justify-between gap-3">
      <a routerLink="/home" class="block text-xl font-bold tracking-tight text-primary" (click)="closeSidebar()">Trello Klon</a>
      <button
        type="button"
        class="btn btn-ghost btn-square btn-sm"
        aria-label="Zatvori sidebar"
        (click)="toggleSidebar()"
      >
        <span class="text-2xl leading-none">&lsaquo;</span>
      </button>
    </div>

    <div>
      <p class="mb-2 text-xs font-semibold uppercase text-base-content/60">Navigacija</p>
      <ul class="menu rounded-box border border-base-300 bg-base-200/70 text-base">
        <li><a routerLink="/home" (click)="closeSidebar()">Dashboard</a></li>
        <li><a routerLink="/profile" (click)="closeSidebar()">Profil</a></li>
        <li>
          <a routerLink="/notifications" (click)="closeSidebar()">
            <span class="flex items-center gap-2">
              <span class="text-lg leading-none">&#128276;</span>
              Notifikacije
            </span>
            <span class="badge badge-primary badge-sm">{{ unreadCount$ | async }}</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="mt-auto grid gap-2 pt-6">
      <button type="button" class="btn btn-outline w-full" (click)="logout()">Logout</button>
    </div>
  </nav>
</aside>
}

@if (!isSidebarOpen) {
  <button
    type="button"
    class="btn btn-primary btn-square fixed left-3 top-3 z-50 shadow-lg"
    aria-label="Otvori sidebar"
    (click)="toggleSidebar()"
  >
    <span class="text-xl leading-none">&#9776;</span>
  </button>
}

<header
  class="navbar fixed right-0 top-0 z-30 min-h-16 border-b border-base-300 bg-base-100/95 px-3 shadow-sm backdrop-blur transition-all duration-300"
  [class.left-72]="isSidebarOpen"
  [class.left-0]="!isSidebarOpen"
>
  <div class="navbar-start">
    @if (isSidebarOpen) {
      <button
        type="button"
        class="btn btn-ghost btn-square lg:hidden"
        aria-label="Zatvori sidebar"
        (click)="toggleSidebar()"
      >
        <span class="text-2xl leading-none">&lsaquo;</span>
      </button>
    }
  </div>

  <div class="navbar-center lg:hidden">
    <a routerLink="/home" class="text-lg font-semibold">Trello Klon</a>
  </div>

  <div class="navbar-end">
    <a routerLink="/notifications" class="btn btn-ghost btn-square" aria-label="Notifikacije">
      <div class="indicator">
        <span class="indicator-item badge badge-primary badge-sm">{{ unreadCount$ | async }}</span>
        <span class="text-xl leading-none">&#128276;</span>
      </div>
    </a>
  </div>
</header>
