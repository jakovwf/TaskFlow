<header class="fixed inset-x-0 top-0 z-40 border-b border-base-300/80 bg-base-100/85 px-4 py-3 shadow-sm backdrop-blur-xl">
  <a
    routerLink="/home"
    class="mx-auto flex w-fit items-center gap-2 rounded-full px-3 py-2 text-base font-bold tracking-tight text-base-content transition hover:bg-base-200"
  >
    <img src="logo/taskflow-icon.png" alt="TaskFlow" class="h-8 w-8 rounded-lg object-contain" />
    <span>TaskFlow</span>
  </a>
</header>

<nav
  aria-label="Glavna navigacija"
  class="fixed inset-x-0 bottom-0 z-50 border-t border-base-300/80 bg-base-100/90 px-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] pt-2 shadow-2xl backdrop-blur-xl md:bottom-6 md:left-1/2 md:right-auto md:w-auto md:-translate-x-1/2 md:rounded-full md:border md:px-3 md:py-2"
>
  <div class="mx-auto grid max-w-md grid-cols-4 gap-1 md:max-w-none md:flex md:items-center md:gap-2">
    <a
      routerLink="/home"
      routerLinkActive="bg-primary text-primary-content shadow-sm"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex min-h-14 flex-col items-center justify-center gap-1 rounded-2xl px-2 text-xs font-semibold text-base-content/70 transition hover:bg-base-200 hover:text-base-content md:min-h-0 md:flex-row md:rounded-full md:px-4 md:py-2 md:text-sm"
    >
      <svg class="h-5 w-5 md:h-4 md:w-4" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10.5 12 3l9 7.5" />
        <path d="M5.5 9.5V21h13V9.5" />
        <path d="M9.5 21v-6h5v6" />
      </svg>
      <span>Početna</span>
    </a>

    <a
      routerLink="/notifications"
      routerLinkActive="notification-tab-active bg-primary text-primary-content shadow-sm"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="relative flex min-h-14 flex-col items-center justify-center gap-1 rounded-2xl px-2 text-xs font-semibold text-base-content/70 transition hover:bg-base-200 hover:text-base-content md:min-h-0 md:flex-row md:rounded-full md:px-4 md:py-2 md:text-sm"
    >
      <span class="relative inline-flex">
        <svg class="h-5 w-5 md:h-4 md:w-4" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
          <path d="M10 21h4" />
        </svg>
        @if (unreadCount$ | async; as unreadCount) {
          @if (unreadCount > 0) {
            <span class="notification-badge absolute -right-3 -top-2 md:-right-4">
              {{ unreadCount > 99 ? '99+' : unreadCount }}
            </span>
          }
        }
      </span>
      <span>Notifikacije</span>
    </a>

    <a
      routerLink="/profile"
      routerLinkActive="bg-primary text-primary-content shadow-sm"
      [routerLinkActiveOptions]="{ exact: true }"
      ariaCurrentWhenActive="page"
      class="flex min-h-14 flex-col items-center justify-center gap-1 rounded-2xl px-2 text-xs font-semibold text-base-content/70 transition hover:bg-base-200 hover:text-base-content md:min-h-0 md:flex-row md:rounded-full md:px-4 md:py-2 md:text-sm"
    >
      <svg class="h-5 w-5 md:h-4 md:w-4" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21a8 8 0 0 0-16 0" />
        <path d="M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10" />
      </svg>
      <span>Profil</span>
    </a>

    <button
      type="button"
      class="flex min-h-14 flex-col items-center justify-center gap-1 rounded-2xl px-2 text-xs font-semibold text-base-content/70 transition hover:bg-error hover:text-error-content md:min-h-0 md:flex-row md:rounded-full md:px-4 md:py-2 md:text-sm"
      (click)="logout()"
    >
      <svg class="h-5 w-5 md:h-4 md:w-4" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 17 15 12 10 7" />
        <path d="M15 12H3" />
        <path d="M21 3v18" />
      </svg>
      <span>Odjava</span>
    </button>
  </div>
</nav>
